apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend1
  template:
    metadata:
      labels:
        app: backend1
    spec:
      containers:
      - name: backend1
        image: your-registry/backend1:latest
        ports:
        - containerPort: 3001
        env:
        - name: BACKEND2_URL
          value: "http://backend2:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: backend1
spec:
  ports:
  - port: 3001
    targetPort: 3001
  selector:
    app: backend1