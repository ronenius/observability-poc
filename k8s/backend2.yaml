apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend2
  template:
    metadata:
      labels:
        app: backend2
      #annotations:
      #  instrumentation.opentelemetry.io/inject-java: "true"
    spec:
      containers:
      - name: backend2
        image: your-registry/backend2:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend2
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: backend2